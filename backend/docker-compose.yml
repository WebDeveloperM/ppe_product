services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tb_data}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - tb_backend_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-tb_data}"]
      interval: 5s
      timeout: 5s
      retries: 20

  employee-service:
    build:
      context: ../employee_service
      dockerfile: Dockerfile
    container_name: tb_employee_service
    restart: unless-stopped
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8010"
    volumes:
      - ../employee_service:/app
    env_file:
      - ../.env
      - ../employee_service/.env
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      EMPLOYEE_SERVICE_DEBUG: "true"
      ALLOWED_HOSTS: "localhost,127.0.0.1,employee-service"
      EMPLOYEE_SERVICE_API_KEYS: ${EMPLOYEE_SERVICE_API_KEY:-dev-employee-service-key}
      FACE_SIMILARITY_THRESHOLD: "72.0"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tb_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      employee-service:
        condition: service_started
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8005"
    volumes:
      - .:/app
    env_file:
      - ../.env
      - .env
    environment:
      DJANGO_DB_ENGINE: ${DJANGO_DB_ENGINE:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-tb_data}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bnpz!@#}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      EMPLOYEE_SERVICE_ENABLED: ${EMPLOYEE_SERVICE_ENABLED:-true}
      EMPLOYEE_SERVICE_BASE_URL: ${EMPLOYEE_SERVICE_BASE_URL:-http://employee-service:8010}
      EMPLOYEE_SERVICE_API_KEY: ${EMPLOYEE_SERVICE_API_KEY:-dev-employee-service-key}
      EMPLOYEE_SERVICE_TIMEOUT: ${EMPLOYEE_SERVICE_TIMEOUT:-15}
    extra_hosts:
      - "host.docker.internal:host-gateway"

  nginx:
    image: nginx:1.27-alpine
    container_name: tb_backend_https
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "8050:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro

  nginx-employee:
    image: nginx:1.27-alpine
    container_name: tb_employee_https
    restart: unless-stopped
    depends_on:
      - employee-service
    ports:
      - "5000:443"
    volumes:
      - ../employee_service/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../employee_service/certs:/etc/nginx/certs:ro

volumes:
  tb_backend_postgres_data:
